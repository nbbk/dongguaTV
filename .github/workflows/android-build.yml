name: Android Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: npm install

      # 4️⃣ 构建 Web 资源
      - name: Build web
        run: npm run build

      # ============================
      # 🔥 品牌 & 域名自动配置开始
      # ============================

      # 5️⃣ 配置应用名称 & 服务器地址
      - name: Configure App Brand (Auto)
        run: |
          echo "📝 Configure app brand..."

          # 应用名称（Web 层）
          sed -i 's/E世界/冬瓜视界/g' src/**/*.ts src/**/*.js src/**/*.vue || true

          # 服务器地址（API / 后端）
          sed -i 's|https://[^"]*|https://donggua.cf|g' src/**/*.ts src/**/*.js || true

          echo "✅ Brand & server configured"

      # 6️⃣ 修改 Android 显示名称（桌面显示）
      - name: Update Android App Name
        run: |
          echo "📝 Updating Android app name..."
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"

          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">冬瓜视界<\/string>/' "$STRINGS_FILE"
            echo "✅ Android app_name updated"
          else
            echo "❌ strings.xml not found"
            exit 1
          fi

      # 7️⃣ 修改 Android applicationId（真正包名）
      - name: Update Android applicationId
        run: |
          echo "📝 Updating applicationId..."
          GRADLE_FILE="android/app/build.gradle"
          sed -i 's/applicationId "[^"]*"/applicationId "cf.donggua.shijie"/' "$GRADLE_FILE"
          echo "✅ applicationId updated"

      # 8️⃣ 修改 AndroidManifest.xml 包名
      - name: Update AndroidManifest package
        run: |
          echo "📝 Updating AndroidManifest.xml package..."
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's/package="[^"]*"/package="cf.donggua.shijie"/' "$MANIFEST_FILE"
          echo "✅ Manifest package updated"

      # ============================
      # 🔥 Capacitor 同步
      # ============================

      # 9️⃣ 同步 Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 🔟 设置 JDK
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 1️⃣1️⃣ 构建 APK
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 1️⃣2️⃣ 上传 APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: donggua-shijie-apk
          path: android/app/build/outputs/apk/release/*.apk
